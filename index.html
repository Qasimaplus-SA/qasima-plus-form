      <hr class="divider">
      <div class="field">
        <label>رقم السجل التجاري <span class="req">*</span></label>
        <input type="text" id="cr" placeholder="10 أرقام" maxlength="10" inputmode="numeric">
        <div class="field-note">أدخل رقم السجل التجاري المكوّن من 10 أرقام</div>
      </div>
      <div class="field">
        <label>رقم الجوال <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="05XXXXXXXX" maxlength="10" inputmode="numeric">
      </div>
      <button class="btn" id="submit-btn" onclick="submitForm()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        <span id="btn-text">إرسال وتأكيد</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
    <div class="success" id="success-sec">
      <div class="success-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
      <h3>تم التأكيد بنجاح ✓</h3>
      <p>شكراً لك،<br>سيتم إعادة إرسال الاتفاقية إليك للتوقيع.</p>
    </div>
  </div>
</div>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEIMKlUFMAekdjIlSZ9MkWEFLFaV_JO-uEy6eEdQun9fMdbSusxM1WXL4Bv-5DxyhYiA/exec";
  function submitForm() {
    const cr = document.getElementById('cr').value.trim();
    const phone = document.getElementById('phone').value.trim();
    let valid = true;
    ['cr','phone'].forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('error'); valid = false; }
      else el.classList.remove('error');
    });
    if (!valid) { alert('يرجى تعبئة جميع الحقول'); return; }
    if (cr.length !== 10 || isNaN(cr)) { alert('رقم السجل التجاري يجب أن يكون 10 أرقام'); return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    document.getElementById('btn-text').textContent = 'جارٍ الإرسال...';
    document.getElementById('spinner').style.display = 'block';
    fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cr, phone, timestamp: new Date().toLocaleString('ar-SA') }) }).then(()=>showSuccess()).catch(()=>showSuccess());
  }
  function showSuccess() {
    document.getElementById('form-sec').style.display = 'none';
    document.getElementById('success-sec').style.display = 'block';
  }
  document.querySelectorAll('input').forEach(el => { el.addEventListener('input', () => el.classList.remove('error')); });
</script>
